<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="100%" stop-color="#0077ff" />
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#444444" />
      <stop offset="50%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#444444" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" fill="#000000" rx="112"/>
  
  <g transform="translate(256, 256) rotate(-45)">
    <!-- Handle -->
    <rect x="-80" y="-12" width="160" height="24" fill="url(#handleGrad)" rx="4"/>
    <path d="M-60 -12 v24 M-40 -12 v24 M-20 -12 v24 M0 -12 v24 M20 -12 v24 M40 -12 v24 M60 -12 v24" stroke="#111111" stroke-width="3" opacity="0.6"/>
    
    <!-- Left Hex Weight -->
    <path d="M-80 -40 L-130 -60 L-150 -40 L-150 40 L-130 60 L-80 40 Z" fill="url(#neonGlow)" filter="url(#glow)"/>
    <path d="M-80 -40 L-130 -60 L-150 -40 L-150 40 L-130 60 L-80 40 Z" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.4"/>
    <line x1="-130" y1="-60" x2="-130" y2="60" stroke="#ffffff" stroke-width="2" opacity="0.2"/>

    <!-- Right Hex Weight -->
    <path d="M80 -40 L130 -60 L150 -40 L150 40 L130 60 L80 40 Z" fill="url(#neonGlow)" filter="url(#glow)"/>
    <path d="M80 -40 L130 -60 L150 -40 L150 40 L130 60 L80 40 Z" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.4"/>
    <line x1="130" y1="-60" x2="130" y2="60" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
  </g>
</svg>
