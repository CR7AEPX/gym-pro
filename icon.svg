<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="100%" stop-color="#0077ff" />
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#444444" />
      <stop offset="50%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#444444" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" fill="#000000" rx="112"/>
  
  <g transform="translate(256, 256) rotate(-45)">
    <!-- Handle -->
    <rect x="-80" y="-12" width="160" height="24" fill="url(#handleGrad)" rx="4"/>
    
    <!-- Knurling details (grip) -->
    <path d="M-60 -12 v24 M-40 -12 v24 M-20 -12 v24 M0 -12 v24 M20 -12 v24 M40 -12 v24 M60 -12 v24" stroke="#111111" stroke-width="3" opacity="0.6"/>
    
    <!-- Inner weights (Larger) -->
    <rect x="-115" y="-70" width="35" height="140" fill="url(#neonGlow)" rx="12" filter="url(#glow)"/>
    <rect x="80" y="-70" width="35" height="140" fill="url(#neonGlow)" rx="12" filter="url(#glow)"/>
    
    <!-- Outer weights (Smaller) -->
    <rect x="-145" y="-50" width="30" height="100" fill="url(#neonGlow)" rx="8" filter="url(#glow)"/>
    <rect x="115" y="-50" width="30" height="100" fill="url(#neonGlow)" rx="8" filter="url(#glow)"/>

    <!-- Edge highlights for weights -->
    <rect x="-110" y="-65" width="8" height="130" fill="#ffffff" opacity="0.3" rx="4"/>
    <rect x="85" y="-65" width="8" height="130" fill="#ffffff" opacity="0.3" rx="4"/>
    
    <rect x="-141" y="-45" width="6" height="90" fill="#ffffff" opacity="0.3" rx="3"/>
    <rect x="119" y="-45" width="6" height="90" fill="#ffffff" opacity="0.3" rx="3"/>
  </g>
</svg>
